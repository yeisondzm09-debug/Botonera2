<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Botonera Gaming Touch</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Orbitron', 'Arial Black', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .grid-container {
            display: flex;
            gap: 12px;
            padding: 15px;
            background-color: rgba(10, 10, 10, 0.8);
            border-radius: 12px;
            overflow-x: auto;
            max-width: 100vw;
        }

        .btn-gaming {
            width: 85px;
            height: 105px;
            background-color: #111;
            border: 3px solid #d4af37;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.05s ease, box-shadow 0.05s ease;
            box-shadow: 0px 4px 10px rgba(212, 175, 55, 0.2);
        }

        .btn-gaming:active {
            transform: scale(0.95);
            box-shadow: 0px 0px 15px rgba(212, 175, 55, 0.6);
            background-color: #222;
        }

        .btn-icon {
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            background-size: cover;
            background-position: center;
        }

        .icon-lp { background: linear-gradient(135deg, #ff0000, #8b0000); color: #fffb00; font-style: italic; text-shadow: 2px 2px #000; }
        .icon-sword { background: linear-gradient(135deg, #2b7fff, #001f5c); color: #fff; }
        .icon-fist { background: linear-gradient(135deg, #1a3c40, #0d1f2d); color: #ff7b00; }
        .icon-fire { background: linear-gradient(135deg, #4a0e4e, #1f0322); color: #ff007f; }
        .icon-shield { background: linear-gradient(135deg, #594200, #1f1700); color: #ffe600; }
        .icon-arrows { background: linear-gradient(135deg, #4a0000, #1a0000); color: #ff0000; }

        .btn-status {
            width: 100%;
            height: 30px;
            background-color: #000000;
            border-top: 2px solid #d4af37;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0f000;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="btn-gaming" onclick="triggerAction('LP')">
            <div class="btn-icon icon-lp">LP</div>
            <div class="btn-status" id="status-lp">ON</div>
        </div>

        <div class="btn-gaming" onclick="triggerAction('Espada')">
            <div class="btn-icon icon-sword">⚔️</div>
            <div class="btn-status" id="count-sword">0/4</div>
        </div>

        <div class="btn-gaming" onclick="triggerAction('Puño')">
            <div class="btn-icon icon-fist">✊</div>
            <div class="btn-status" id="count-fist">0/1</div>
        </div>

        <div class="btn-gaming" onclick="triggerAction('Fuego')">
            <div class="btn-icon icon-fire">🔥</div>
            <div class="btn-status" id="count-fire">0/1</div>
        </div>

        <div class="btn-gaming" onclick="triggerAction('Escudo')">
            <div class="btn-icon icon-shield">🛡️</div>
            <div class="btn-status" id="count-shield">0/1</div>
        </div>

        <div class="btn-gaming" onclick="triggerAction('Flechas')">
            <div class="btn-icon icon-arrows">🔄</div>
            <div class="btn-status" id="count-arrows">0/15</div>
        </div>
    </div>

    <script>
        function triggerAction(actionName) {
            console.log("Acción: " + actionName);
            
            if (navigator.vibrate) {
                navigator.vibrate(30); 
            }

            // Lógica corregida para cada botón
            if (actionName === 'LP') {
                const lp = document.getElementById('status-lp');
                lp.innerText = lp.innerText === 'ON' ? 'OFF' : 'ON';
            } 
            if (actionName === 'Espada') {
                updateCounter('count-sword', 4);
            }
            if (actionName === 'Puño') {
                updateCounter('count-fist', 1);
            }
            if (actionName === 'Fuego') {
                updateCounter('count-fire', 1);
            }
            if (actionName === 'Escudo') {
                updateCounter('count-shield', 1);
            }
            if (actionName === 'Flechas') {
                updateCounter('count-arrows', 15);
            }
        }

        // Función progresiva corregida paso a paso
        function updateCounter(elementId, max) {
            const el = document.getElementById(elementId);
            // Obtenemos el número actual antes de la barra '/'
            let current = parseInt(el.innerText.split('/')[0]);
            
            // Sumamos 1 de forma progresiva
            current++; 
            
            // Si supera el máximo asignado, regresa a 0
            if (current > max) {
                current = 0; 
            }
            
            // Guardamos el nuevo valor en el botón
            el.innerText = current + "/" + max;
        }
    </script>
</body>
</html>
